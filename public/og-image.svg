<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#15202B"/>
    </linearGradient>
  </defs>

  <rect width="640" height="320" fill="url(#bg)"/>

  <!-- Icon, same two-color X as the extension icon -->
  <g transform="translate(60, 80)">
    <rect width="160" height="160" rx="36" fill="#000000"/>
    <g stroke-linecap="round" stroke-width="22" transform="translate(80, 80)">
      <line x1="-32" y1="-32" x2="32" y2="32" stroke="#FFFFFF"/>
      <line x1="32" y1="-32" x2="-32" y2="32" stroke="#1D9BF0"/>
    </g>
  </g>

  <!-- Title -->
  <text x="252" y="170" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#E7E9EA" letter-spacing="-1.5">Better X</text>

  <!-- Subtitle -->
  <text x="254" y="204" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#71767B">Small but useful enhancements for x.com</text>
</svg>
